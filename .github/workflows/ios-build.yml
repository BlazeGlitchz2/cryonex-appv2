name: Build iOS App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install Dependencies
        run: pnpm install

      - name: Build Web App
        run: pnpm run build
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"

      - name: Update Capacitor iOS
        run: npx cap sync ios

      # Step 1: Build the App (Simulator Build - No Signing Needed)
      # This verifies the code compiles correctly
      - name: Build for Simulator (Verify Build)
        run: |
          cd ios/App
          xcodebuild -project App.xcodeproj \
            -scheme App \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=18.5' \
            -configuration Debug \
            clean build \
            CODE_SIGNING_ALLOWED=NO

      # Step 2: ZIP the iOS Project (So you can download it)
      # This allows you to hand this file to someone with a Mac/MacInCloud
      - name: Compress iOS Project
        run: |
          zip -r ios-project.zip ios/ -x "ios/App/Pods/*" "ios/App/DerivedData/*"

      # --- VIRTUAL MAC ACCESS ---
      # This step pauses the workflow and gives you SSH access to the Mac!
      # Look in the logs below for the SSH address to connect.
      - name: 🔍 Virtual Mac Access (Tmate)
        uses: mxschmitt/action-tmate@v3
      # ------------------------

      - name: Upload iOS Project
        uses: actions/upload-artifact@v4
        with:
          name: ios-project-source
          path: ios-project.zip
          retention-days: 5

      # Step 3: (Optional) If you had secrets, we would build the IPA here.
      # See IOS_BUILD_HELP.md for instructions.
